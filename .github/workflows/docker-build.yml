name: Build and Push to Docker Hub

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v2.0.0)'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install fastapi 'uvicorn[standard]' polymarket-paper-trader
          pip install pytest pytest-asyncio httpx
      - name: Run backend tests
        run: python -m pytest tests/ --ignore=tests/e2e -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/poly-trade:latest
            ${{ secrets.DOCKER_USERNAME }}/poly-trade:${{ github.sha }}
          no-cache: true
          build-args: |
            CACHE_BUST=${{ github.sha }}
