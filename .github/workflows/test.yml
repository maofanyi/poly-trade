name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi 'uvicorn[standard]' polymarket-paper-trader
          pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        run: python -m pytest tests/ --ignore=tests/e2e --ignore=tests/test_local_longrun.py -v --tb=short

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fastapi 'uvicorn[standard]' polymarket-paper-trader
          pip install pytest pytest-asyncio playwright pytest-playwright httpx

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run E2E tests
        run: python -m pytest tests/e2e/ -v --tb=short
