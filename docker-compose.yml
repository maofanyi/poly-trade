services:
  copy-trader:
    build: .
    container_name: polymarket-copy-trader
    restart: unless-stopped
    ports:
      - "8766:8766"
    volumes:
      - ./data:/app/data
      - ./copy_trader_state.json:/app/copy_trader_state.json
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
