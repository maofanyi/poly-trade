services:
  copy-trader:
    image: mao968/poly-trade:latest
    container_name: polymarket-copy-trader
    restart: unless-stopped
    ports:
      - "8766:8766"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      - SCAN_INTERVAL=120
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
